<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shop Now</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center">Shop Now</h1>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card product-card">

                <img src="images/dress1.jpg" class="card-img-top" alt="Dress">

                <div class="card-body text-center">

                    <h5>Luxury Dress</h5>

                    <p>P650</p>

                    <button class="btn btn-dark">
                        Add To Cart
                    </button>

                </div>

            </div>
        </div>

        <div class="col-md-4">
            <div class="card product-card">

                <img src="images/bag1.jpg" class="card-img-top" alt="Bag">

                <div class="card-body text-center">

                    <h5>Luxury Bag</h5>

                    <p>P450</p>

                    <button class="btn btn-dark">
                        Add To Cart
                    </button>

                </div>

            </div>
        </div>

        <div class="col-md-4">
            <div class="card product-card">

                <img src="images/shoes1.jpg" class="card-img-top" alt="Shoes">

                <div class="card-body text-center">

                    <h5>Luxury Shoes</h5>

                    <p>P700</p>

                    <button class="btn btn-dark">
                        Add To Cart
                    </button>

                </div>

            </div>
        </div>

    </div>

    <!-- Payment Form -->
    <div class="payment-box mt-5">

        <h2>Payment Details</h2>

        <form>

            <input type="text" class="form-control mb-3" placeholder="Full Name" required>

            <input type="text" class="form-control mb-3" placeholder="Card Number" required>

            <input type="text" class="form-control mb-3" placeholder="Expiry Date" required>

            <input type="text" class="form-control mb-3" placeholder="CVV" required>

            <button class="btn btn-success w-100">
                Confirm Payment
            </button>

        </form>

        <p class="mt-3">
            After successful payment you will receive an email with further details.
        </p>

    </div>

</div>

</body>
</html>
